name: 'FlutterApp'
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.5.0
  device_preview: ^1.3.1
  flutter_timezone: ^4.1.1
  go_router: ^16.0.0
  json_annotation: ^4.9.0
  permission_handler: ^12.0.1
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  timezone: ^0.10.1
  flutter_local_notifications: ^19.4.1

dev_dependencies:
  build_runner: ^2.6.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  json_serializable: ^6.11.1
  very_good_analysis: ^10.0.0

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
  - assets/data/
  - assets/icon/
  - assets/images/
  - assets/images/backgrounds/
  - assets/images/buttons/
  - assets/fonts/
  # Variable fonts will be registered here after the files are added to assets/fonts/:
  # OpenSans-VariableFont_wdth,wght.ttf
  # OpenSans-Italic-VariableFont_wdth,wght.ttf
  # Rubik-VariableFont_wght.ttf
  # Rubik-Italic-VariableFont_wght.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.jpg"
  adaptive_icon_background: "#FFFFFF00"
  adaptive_icon_foreground: "assets/icon/icon.jpg"
